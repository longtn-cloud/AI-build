services:
  - type: web
    name: document-knowledge-assistant-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_JWT_SECRET
        sync: false
      - key: SUPABASE_DB_URL
        sync: false
      - key: VOYAGE_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: STORAGE_BUCKET
        value: documents
